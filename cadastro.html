<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro | Focus Tea</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <main class="auth-card">
    <a class="brand center" href="index.html"><span class="logo">🍵</span><span>Focus Tea</span></a>
    <h1>Criar conta</h1>
    <p>Monte seu espaço de estudo confortável.</p>
    <div id="authError" class="auth-error" role="alert"></div>
    <form onsubmit="handleCadastro(event)">
      <label for="nomeCadastro">Nome
        <input id="nomeCadastro" name="nome" type="text" placeholder="Seu nome" autocomplete="name" required />
      </label>
      <label for="emailCadastro">Email
        <input id="emailCadastro" name="email" type="email" placeholder="seuemail@exemplo.com" autocomplete="email" required />
      </label>
      <label for="senhaCadastro">Senha
        <input id="senhaCadastro" name="senha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" minlength="6" required />
      </label>
      <button class="btn btn-primary full">Cadastrar</button>
    </form>
    <p class="muted">Já tem conta? <a href="login.html">Entrar</a></p>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
