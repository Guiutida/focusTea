<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar | Focus Tea</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <main class="auth-card">
    <a class="brand center" href="index.html"><span class="logo">🍵</span><span>Focus Tea</span></a>
    <h1>Entrar</h1>
    <p>Acesse seu ambiente de estudos personalizado.</p>
    <div id="authError" class="auth-error" role="alert"></div>
    <form onsubmit="handleLogin(event)">
      <label for="emailLogin">Email
        <input id="emailLogin" name="email" type="email" placeholder="seuemail@exemplo.com" autocomplete="email" required />
      </label>
      <label for="senhaLogin">Senha
        <input id="senhaLogin" name="senha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="current-password" required />
      </label>
      <button class="btn btn-primary full">Entrar</button>
    </form>
    <p class="muted">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
